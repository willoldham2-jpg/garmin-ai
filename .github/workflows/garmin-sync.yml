name: Garmin sync

on:
  schedule:
    - cron: "0 8 * * *"   # runs every morning at 8am UTC
  workflow_dispatch:        # lets you trigger it manually from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync Garmin data
        env:
          GARMIN_TOKEN_B64: ${{ secrets.GARMIN_TOKEN_B64 }}
        run: python sync_garmin.py --days 3 --sink files --out garmin

      - name: Commit and push output
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add garmin/
          git diff --cached --quiet || git commit -m "chore: garmin sync $(date -u +%Y-%m-%d)"
          git push
